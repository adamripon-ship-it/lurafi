name: Theme Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: theme-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  theme-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify locale build
        run: npm run locales:build

      - name: Sync missing locale keys
        run: npm run locales:sync

      - name: Asset audit (orphans + size budget)
        run: node scripts/audit-assets.mjs --ci

      - name: Shopify Theme Check
        run: npm run theme:check
