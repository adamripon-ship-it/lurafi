name: Deploy theme (manual)

# Push to live only when you explicitly run this workflow.
# Secrets: SHOPIFY_CLI_THEME_TOKEN, SHOPIFY_FLAG_STORE

on:
  workflow_dispatch:
    inputs:
      theme_id:
        description: Live theme ID
        required: true
        default: "196456219011"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Shopify CLI
        run: npm ci

      - name: Push theme to Shopify
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
        run: |
          shopify theme push \
            --theme "${{ github.event.inputs.theme_id }}" \
            --allow-live
