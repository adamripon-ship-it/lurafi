name: Deploy theme (manual)

# Push to live only when you explicitly run this workflow.
# Secrets (environment: production):
#   SHOPIFY_FLAG_STORE, SHOPIFY_CLI_THEME_TOKEN
#   Optional: SHOPIFY_CLIENT_ID + SHOPIFY_CLIENT_SECRET (auto-refresh 24h token each run)
# Sync: ./scripts/sync-github-deploy-secrets.sh

on:
  workflow_dispatch:
    inputs:
      theme_id:
        description: Live theme ID (see config/live-theme.json)
        required: true
        default: "185079038330"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Shopify CLI
        run: npm ci

      - name: Resolve Shopify access token
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          set -euo pipefail
          STORE="${SHOPIFY_FLAG_STORE}"
          TOKEN=""
          if [[ -n "${SHOPIFY_CLIENT_ID:-}" && -n "${SHOPIFY_CLIENT_SECRET:-}" ]]; then
            RESP="$(curl -sS -X POST "https://${STORE}/admin/oauth/access_token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=client_credentials" \
              -d "client_id=${SHOPIFY_CLIENT_ID}" \
              -d "client_secret=${SHOPIFY_CLIENT_SECRET}")"
            TOKEN="$(node -e "
              const raw = process.argv[1];
              try {
                const j = JSON.parse(raw);
                if (j.access_token) { console.log(j.access_token); process.exit(0); }
              } catch (_) {}
              process.exit(1);
            " "${RESP}" 2>/dev/null || true)"
          fi
          if [[ -z "${TOKEN}" ]]; then
            if [[ -z "${SHOPIFY_CLI_THEME_TOKEN:-}" ]]; then
              echo "No access token: client_credentials failed and SHOPIFY_CLI_THEME_TOKEN is empty." >&2
              exit 1
            fi
            TOKEN="${SHOPIFY_CLI_THEME_TOKEN}"
          fi
          echo "::add-mask::${TOKEN}"
          echo "SHOPIFY_CLI_THEME_TOKEN=${TOKEN}" >> "${GITHUB_ENV}"

      - name: Push theme to Shopify
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ env.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
        run: |
          npx shopify theme push \
            --store "${SHOPIFY_FLAG_STORE}" \
            --password "${SHOPIFY_CLI_THEME_TOKEN}" \
            --theme "${{ github.event.inputs.theme_id }}" \
            --allow-live

      - name: Republish theme (bust Shopify page cache)
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ env.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
        run: |
          npx shopify theme publish \
            --store "${SHOPIFY_FLAG_STORE}" \
            --password "${SHOPIFY_CLI_THEME_TOKEN}" \
            --theme "${{ github.event.inputs.theme_id }}" \
            --force

      - name: Verify live storefront
        run: node scripts/verify-live-storefront.mjs
